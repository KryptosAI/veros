services:
  veros:
    build: .
    ports:
      - "3100:3100"
    env_file:
      - .env
    environment:
      - PORT=3100
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - DEID_SECRET=${DEID_SECRET:-change-this-in-production}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      - openchart_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: local Ollama as alternative to DeepSeek
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - llm
    deploy:
      resources:
        reservations:
          memory: 8G

volumes:
  openchart_data:
  ollama_data:
